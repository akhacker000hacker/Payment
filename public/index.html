<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Force Android — Payment</title>
<style>
  :root {
    --bg:      #0f1115;
    --card:    #161a22;
    --accent:  #4f8cff;
    --accent2: #22c55e;
    --danger:  #ef4444;
    --text:    #e6e9ef;
    --muted:   #8b93a3;
    --border:  #262c38;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2333, var(--bg));
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans Bengali", sans-serif;
    color: var(--text);
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 20px;
    margin: 0 0 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  p.sub {
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 22px;
  }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin: 14px 0 6px;
  }
  input, select {
    width: 100%;
    padding: 12px 14px;
    background: #10141c;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }
  input[readonly] {
    opacity: 0.6;
    cursor: default;
    border-color: var(--border);
  }
  button.submit-btn {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button.submit-btn:hover { opacity: 0.9; }
  button.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  button.return-btn {
    width: 100%;
    margin-top: 14px;
    padding: 13px;
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: block;
    text-align: center;
    transition: opacity 0.15s;
  }
  button.return-btn:hover { opacity: 0.9; }

  .status-box {
    display: none;
    text-align: center;
    padding: 10px 0 4px;
  }
  .spinner {
    width: 46px; height: 46px;
    margin: 8px auto 18px;
    border: 4px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .status-sub   { font-size: 13px; color: var(--muted); }
  .ref-code {
    margin-top: 16px;
    font-size: 11px;
    color: var(--muted);
    word-break: break-all;
    background: #10141c;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
  }
  .icon-circle {
    width: 64px; height: 64px;
    border-radius: 50%;
    margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
  }
  .icon-confirmed { background: rgba(34,197,94,0.15); color: var(--accent2); }
  .icon-rejected  { background: rgba(239,68,68,0.15);  color: var(--danger);  }

  .error-msg {
    color: var(--danger);
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }
  .uid-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(79,140,255,0.1);
    border: 1px solid rgba(79,140,255,0.3);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 18px;
  }
</style>
</head>
<body>

<div class="card">
  <div id="formView">
    <h1>💳 Payment Details</h1>
    <p class="sub">Enter your payment details below. We'll verify and confirm your payment.</p>

    <!-- User ID badge (shown when uid is in URL) -->
    <div class="uid-badge" id="uidBadge" style="display:none;">
      🤖 Telegram ID: <strong id="uidDisplay"></strong>
    </div>

    <form id="paymentForm">

      <label>Tnx No.</label>
      <input type="text" id="tnxNo" placeholder="Transaction Number" required />

      <label>Amount (₹)</label>
      <input type="number" id="amount" placeholder="e.g. 300" required />

      <label>ATT No.</label>
      <input type="text" id="attNo" placeholder="ATT Number" required />

      <button type="submit" class="submit-btn" id="submitBtn">Submit Payment</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>

  <div class="status-box" id="statusView">
    <div id="statusInner"></div>
  </div>
</div>

<script>
  const API_BASE    = '';
  const BOT_REDIRECT_BASE = 'https://t.me/'; // BOT_USERNAME appended dynamically

  // --- Read uid from URL query param ---
  const params = new URLSearchParams(window.location.search);
  const uid    = params.get('uid') || null;

  // Show uid badge if present
  if (uid) {
    document.getElementById('uidBadge').style.display   = 'inline-flex';
    document.getElementById('uidDisplay').textContent    = uid;
  }

  const form       = document.getElementById('paymentForm');
  const formView   = document.getElementById('formView');
  const statusView = document.getElementById('statusView');
  const statusInner= document.getElementById('statusInner');
  const submitBtn  = document.getElementById('submitBtn');
  const errorMsg   = document.getElementById('errorMsg');

  let pollTimer    = null;
  let botUsername  = '';  // filled by server or set statically below

  // Fetch bot username from server (optional helper endpoint)
  fetch('/api/config')
    .then(r => r.json())
    .then(d => { botUsername = d.botUsername || ''; })
    .catch(() => {});

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';
    submitBtn.disabled     = true;
    submitBtn.textContent  = 'Sending...';

    const payload = {
      tnxNo:  document.getElementById('tnxNo').value.trim(),
      amount: document.getElementById('amount').value.trim(),
      attNo:  document.getElementById('attNo').value.trim(),
      uid:    uid,   // Telegram chat ID — may be null
    };

    try {
      const res  = await fetch(`${API_BASE}/api/submit`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Something went wrong');

      localStorage.setItem('paymentRefId', data.id);
      showSubmitted(data.id);

    } catch (err) {
      errorMsg.textContent  = err.message;
      errorMsg.style.display = 'block';
      submitBtn.disabled    = false;
      submitBtn.textContent = 'Submit Payment';
    }
  });

  function showSubmitted(id) {
    formView.style.display  = 'none';
    statusView.style.display = 'block';

    const botLink = botUsername
      ? `https://t.me/${botUsername}?start=paysent`
      : null;

    statusInner.innerHTML = `
      <div class="icon-circle icon-confirmed">✓</div>
      <div class="status-title">Payment Submitted!</div>
      <div class="status-sub">
        Your payment is under review.<br>
        You will be notified in Telegram once it's approved.
      </div>
      <div class="ref-code">Ref ID: ${id}</div>
      ${botLink
        ? `<a href="${botLink}" class="return-btn">↩ Return to Bot</a>`
        : '<div style="margin-top:14px;font-size:13px;color:var(--muted);">Return to your Telegram bot for updates.</div>'
      }
    `;
    localStorage.removeItem('paymentRefId');
  }

  function showConfirmed() {
    statusInner.innerHTML = `
      <div class="icon-circle icon-confirmed">✓</div>
      <div class="status-title">Payment Confirmed!</div>
      <div class="status-sub">Your payment has been successfully confirmed. Credits will be added shortly.</div>
      <button class="submit-btn" style="margin-top:18px" onclick="resetForm()">Submit New Payment</button>
    `;
    localStorage.removeItem('paymentRefId');
  }

  function showRejected() {
    statusInner.innerHTML = `
      <div class="icon-circle icon-rejected">✕</div>
      <div class="status-title">Payment Rejected</div>
      <div class="status-sub">Your payment could not be verified. Please contact support.</div>
      <button class="submit-btn" style="margin-top:18px" onclick="resetForm()">Try Again</button>
    `;
    localStorage.removeItem('paymentRefId');
  }

  function showExpired() {
    statusInner.innerHTML = `
      <div class="icon-circle icon-rejected">!</div>
      <div class="status-title">Request Expired</div>
      <div class="status-sub">This payment request could not be found. It may have expired or the server restarted. Please submit a new payment.</div>
      <button class="submit-btn" style="margin-top:18px" onclick="resetForm()">Submit New Payment</button>
    `;
    localStorage.removeItem('paymentRefId');
  }

  function resetForm() {
    localStorage.removeItem('paymentRefId');
    if (pollTimer) clearInterval(pollTimer);
    form.reset();
    errorMsg.style.display = 'none';
    submitBtn.disabled     = false;
    submitBtn.textContent  = 'Submit Payment';
    statusView.style.display = 'none';
    formView.style.display   = 'block';
  }

  function startPolling(id) {
    if (pollTimer) clearInterval(pollTimer);
    let notFoundCount = 0;

    pollTimer = setInterval(async () => {
      try {
        const res = await fetch(`${API_BASE}/api/status/${id}`);

        if (res.status === 404) {
          notFoundCount++;
          if (notFoundCount >= 2) { clearInterval(pollTimer); showExpired(); }
          return;
        }

        notFoundCount = 0;
        if (!res.ok) return;

        const data = await res.json();
        if      (data.status === 'confirmed') { clearInterval(pollTimer); showConfirmed(); }
        else if (data.status === 'rejected')  { clearInterval(pollTimer); showRejected(); }
      } catch { /* ignore transient errors */ }
    }, 3000);
  }

  // Resume checking if user refreshes mid-wait
  window.addEventListener('DOMContentLoaded', () => {
    const savedId = localStorage.getItem('paymentRefId');
    if (savedId) { showSubmitted(savedId); }
  });
</script>

</body>
</html>
